<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Início — Meu Site</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;padding:0}
    .site-nav{background:#222;color:#fff;padding:.6rem}
    .site-nav a{color:#fff;text-decoration:none;margin-right:.8rem}
    main{padding:1rem}
    .site-footer{background:#f4f4f4;padding:1rem;text-align:center}
  </style>
</head>
<body>
  <!-- pontos de montagem obrigatórios -->
  <div id="site-header" aria-hidden="false"></div>

  <main>
    <h1>Bem-vindo</h1>
    <p>Conteúdo da página inicial.</p>
  </main>

  <div id="site-footer" aria-hidden="false"></div>

  <script>
    // Função robusta para incluir fragmentos HTML
    (function includeHTML(selector, url){
      const mount = document.querySelector(selector);
      if (!mount) return;
      // Usa fetch com cache-bypass opcional durante desenvolvimento: '?v=' + Date.now()
      fetch(url, {cache: 'no-store'}).then(async res=>{
        if (!res.ok) {
          // mostra erro visível para facilitar debug
          mount.innerHTML = '<!-- include failed: ' + res.status + ' -->';
          console.error('Include failed', url, res.status);
          return;
        }
        const text = await res.text();
        mount.innerHTML = text;
        // opcional: executar scripts internos do fragmento
        mount.querySelectorAll('script').forEach(old => {
          const script = document.createElement('script');
          if (old.src) script.src = old.src;
          else script.textContent = old.textContent;
          document.head.appendChild(script).parentNode.removeChild(script);
        });
      }).catch(err=>{
        mount.innerHTML = '<!-- include error -->';
        console.error('Include error', url, err);
      });
    })('#site-header','header.html');

    (function(){ includeHTML('#site-footer','footer.html'); })();
  </script>
</body>
</html>
